<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --cream: #f7f3ee;
    --sand: #e8e0d4;
    --warm-white: #faf8f5;
    --stone: #c4b8a8;
    --taupe: #9a8c7e;
    --dark: #2c2820;
    --accent: #b5956a;
    --accent-light: #d4b896;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--warm-white);
    color: var(--dark);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
  }
  .cursor-follower {
    width: 32px; height: 32px;
    border: 1px solid var(--accent-light);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    opacity: 0.6;
  }

  /* Nav */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 28px 60px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(250,248,245,0.95) 60%, transparent);
    backdrop-filter: blur(4px);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.15rem;
    letter-spacing: 0.15em;
    color: var(--dark);
    text-decoration: none;
  }

  .nav-links {
    display: flex; gap: 40px; list-style: none;
  }

  .nav-links a {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--taupe);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--dark); }

  /* Hero */
  .hero {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    position: relative;
    overflow: hidden;
  }

  .hero-left {
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 120px 60px 80px;
    position: relative;
    z-index: 2;
  }

  .hero-tag {
    font-size: 0.68rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 1s 0.2s ease forwards;
  }

  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3.5rem, 6vw, 6rem);
    line-height: 1.02;
    color: var(--dark);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeUp 1s 0.4s ease forwards;
  }

  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-desc {
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--taupe);
    max-width: 360px;
    opacity: 0;
    animation: fadeUp 1s 0.6s ease forwards;
    margin-bottom: 48px;
  }
